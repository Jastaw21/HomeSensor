<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chestnut Home Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.27.0/plotly.min.js"></script>
    <link rel="stylesheet" href="/static/styles.css">

</head>
<body>
<h1>Chestnut Conditions</h1>
<p class="subtitle" id="status">Loading...</p>


<div class="filter-row">
    <label for="sensor-filter"></label><select id="sensor-filter">
    <option value="all">All sensors</option>
</select>
    <label for="range-filter"></label><select id="range-filter">
    <option value="24" selected>Last 24 hours</option>
    <option value="48">Last 48 hours</option>
    <option value="168">Last 7 days</option>
    <option value="0">All time</option>
</select>
    <button onclick="loadData()">Refresh</button>
</div>

<div class="callout-container">
    <div class="callout" id="latest-reading">
        <h2>Latest Reading</h2>
        <p id="timestamp-value">This is a callout with a title and description.</p>
    </div>
    <div class="callout" id="latest-temp">
        <h2>Latest Temp</h2>
        <p id="temp-value">This is a callout with a title and description.</p>
    </div>
    <div class="callout" id="latest-humidity">
        <h2>Latest Humidity</h2>
        <p id="humidity-value">This is a callout with a title and description.</p>
    </div>
</div>


<div class="card">
    <h2>Overview</h2>
    <div id="chart-overview"></div>
</div>

<script src="/static/plots.js"></script>

</body>
</html>
